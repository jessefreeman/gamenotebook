name: Tag Release Builds

on:
  push:
    branches-ignore:
      - "**"
    tags:
      - "*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build (${{ matrix.platform.name }})
    runs-on: ${{ matrix.platform.os }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - os: macos-latest
            name: macos
          - os: windows-latest
            name: windows
          - os: ubuntu-22.04
            name: linux

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 7.33.7
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        if: matrix.platform.name == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev librsvg2-dev patchelf
          sudo apt-get install -y libwebkit2gtk-4.0-dev || sudo apt-get install -y libwebkit2gtk-4.1-dev
          sudo apt-get install -y libayatana-appindicator3-dev || sudo apt-get install -y libappindicator3-dev

      - name: Install JavaScript dependencies
        run: pnpm install --frozen-lockfile

      - name: Create CI Tauri config
        run: |
          node -e "const fs=require('fs');const path='src-tauri/tauri.conf.json';const cfg=JSON.parse(fs.readFileSync(path,'utf8'));if(cfg?.tauri?.updater){cfg.tauri.updater.active=false;}fs.writeFileSync('src-tauri/tauri.conf.ci.json', JSON.stringify(cfg, null, 2));"

      - name: Build Tauri bundles
        run: pnpm exec tauri build --config src-tauri/tauri.conf.ci.json

      - name: Collect release package files
        shell: bash
        run: |
          node -e "const fs=require('fs');const path=require('path');const root=path.join('src-tauri','target','release','bundle');const out='release-files';const include=(name)=>name.endsWith('.dmg')||name.endsWith('.app.tar.gz')||name.endsWith('.msi')||name.endsWith('.exe')||name.endsWith('.deb')||name.endsWith('.AppImage')||name.endsWith('.rpm');const walk=(dir,acc)=>{for(const entry of fs.readdirSync(dir,{withFileTypes:true})){const full=path.join(dir,entry.name);if(entry.isDirectory()){walk(full,acc);continue;}if(include(entry.name)){acc.push(full);}}};if(!fs.existsSync(root)){throw new Error('Bundle directory not found: '+root);}fs.rmSync(out,{recursive:true,force:true});fs.mkdirSync(out,{recursive:true});const files=[];walk(root,files);if(files.length===0){throw new Error('No release package files found under '+root);}for(const file of files){const dest=path.join(out,path.basename(file));fs.copyFileSync(file,dest);}console.log(files.join('\\n'));"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bundles-${{ matrix.platform.name }}
          path: release-files/*
          if-no-files-found: error

  release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: bundles-*
          path: release-artifacts

      - name: List release assets
        run: |
          ls -R release-artifacts

      - name: Validate assets from each platform
        shell: bash
        run: |
          for platform in macos windows linux; do
            count=$(find "release-artifacts/bundles-${platform}" -type f | wc -l | tr -d ' ')
            echo "${platform}_files=${count}"
            if [ "${count}" -eq 0 ]; then
              echo "Missing release files from ${platform}"
              exit 1
            fi
          done

      - name: Attach artifacts to tag release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: release-artifacts/**/*
