name: Tag Release Builds

on:
  push:
    branches-ignore:
      - "**"
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  preflight:
    name: Release preflight
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validate release tag format
        shell: bash
        run: |
          if [[ ! "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Tag '${GITHUB_REF_NAME}' is invalid. Use v<major>.<minor>.<patch>."
            exit 1
          fi

      - name: Validate tag commit is on main branch history
        shell: bash
        run: |
          git fetch --no-tags origin main
          if ! git merge-base --is-ancestor "${GITHUB_SHA}" "origin/main"; then
            echo "::error::Release tags must point to a commit that is on origin/main history."
            exit 1
          fi

      - name: Sync app versions from tag
        run: node scripts/sync-version-from-tag.cjs --tag ${{ github.ref_name }}

      - name: Validate release workflow invariants
        run: node scripts/check-tag-release-workflow.cjs --strict

  build:
    name: Build (${{ matrix.platform.name }})
    needs: preflight
    runs-on: ${{ matrix.platform.os }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - os: macos-latest
            name: macos
          - os: windows-latest
            name: windows
          - os: ubuntu-22.04
            name: linux

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Sync app versions from tag
        run: node scripts/sync-version-from-tag.cjs --tag ${{ github.ref_name }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 7.33.7
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        if: matrix.platform.name == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev librsvg2-dev patchelf
          sudo apt-get install -y libwebkit2gtk-4.0-dev || sudo apt-get install -y libwebkit2gtk-4.1-dev
          sudo apt-get install -y libayatana-appindicator3-dev || sudo apt-get install -y libappindicator3-dev

      - name: Install JavaScript dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and package release artifacts
        env:
          RELEASE_VERSION: ${{ github.ref_name }}
        run: pnpm build:release -- --platform ${{ matrix.platform.name }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bundles-${{ matrix.platform.name }}
          path: release-files/*
          if-no-files-found: error

  release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    if: always() && needs.preflight.result == 'success'
    needs:
      - preflight
      - build

    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Attach artifacts to tag release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: release-artifacts/*
          fail_on_unmatched_files: false
          overwrite_files: true
